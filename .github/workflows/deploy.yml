name: CI/CD — Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Lint + Test + Build
  # ─────────────────────────────────────────
  ci:
    name: 🔍 Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. check ESLint
      - name: Run ESLint
        run: npm run lint

      # 5. run Unit Test (Vitest)
      # - name: Run Unit Tests
      #   run: npm run test:ci

      # 6. Build production with base-href for GitHub Pages
      - name: Build
        run: npm run build -- --base-href /angular-signal-quiz/

      # 7. Upload artifact to use in job CD
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/test-cicd/browser

  # ─────────────────────────────────────────
  # JOB 2: CD — Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4