name: 🚀 CI/CD — Angular to GitHub Pages

on:
  push:
    branches:
      - main   # Tự động chạy khi push lên main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Lint + Test + Build
  # ─────────────────────────────────────────
  ci:
    name: 🔍 Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Cài dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Kiểm tra ESLint
      - name: Run ESLint
        run: npm run lint

      # # 5. Chạy Unit Test (Karma headless)
      # - name: Run Unit Tests
      #   run: npm run test:ci

      # 6. Build production với base-href cho GitHub Pages
      - name: Build
        run: npm run build -- --base-href /angular-ci-cd/
        # ⚠️ Thay my-angular-app bằng tên repo GitHub của bạn

      # 7. Upload artifact để job CD sử dụng
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/angular-ci-cd/browser
          # ⚠️ Kiểm tra lại đường dẫn này trong angular.json

  # ─────────────────────────────────────────
  # JOB 2: CD — Deploy lên GitHub Pages
  # Chỉ chạy nếu JOB 1 pass ✅
  # ─────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
