<div class="flex flex-col items-center justify-center min-h-screen bg-linear-to-br from-indigo-50 to-violet-100 p-4">
  <div class="bg-white rounded-3xl shadow-xl p-10 max-w-md w-full text-center">
    <!-- Icon -->
    <div class="text-6xl mb-6">⚡</div>

    <h1 class="text-3xl font-bold text-indigo-700 mb-2">Angular Signals Quiz</h1>
    <p class="text-gray-500 mb-8">Kiểm tra kiến thức của bạn về Angular Signals</p>

    @if (quiz.loading()) {
      <p class="text-indigo-400 animate-pulse mb-6">Đang tải câu hỏi...</p>
    } @else {
      <div class="flex justify-center gap-6 mb-8 text-sm text-gray-600">
        <div class="flex flex-col items-center gap-1">
          <span class="text-2xl font-bold text-indigo-600">{{ quiz.total() }}</span>
          <span>câu hỏi</span>
        </div>
        <div class="w-px bg-gray-200"></div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-2xl font-bold text-indigo-600">4</span>
          <span>đáp án / câu</span>
        </div>
        <div class="w-px bg-gray-200"></div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-2xl font-bold text-indigo-600">1</span>
          <span>lần chọn</span>
        </div>
      </div>

      <button
        (click)="quiz.start()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold rounded-xl transition-all duration-150 text-lg"
      >
        Bắt đầu →
      </button>
    }

    <p class="text-xs text-gray-400 mt-6">Mỗi câu chỉ được chọn một lần, không thể đổi lại</p>
  </div>
</div>
