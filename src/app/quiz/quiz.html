<!-- Language switcher -->
<div class="fixed top-4 right-4 z-50 flex gap-1 bg-white/80 backdrop-blur rounded-xl shadow-md p-1">
  @for (l of i18n.langs; track l) {
    <button
      (click)="i18n.setLang(l)"
      class="px-2 py-1 rounded-lg text-xs font-semibold transition-all"
      [class]="i18n.lang() === l ? 'bg-indigo-600 text-white' : 'text-gray-500 hover:bg-gray-100'"
    >
      {{ i18n.langFlags[l] }} {{ i18n.langLabels[l] }}
    </button>
  }
</div>

@switch (quiz.status()) {
  @case ('idle') {
    <app-start />
  }

  @case ('playing') {
    <app-question
      [question]="quiz.currentQuestion()"
      [selectedAnswer]="quiz.selectedAnswer()"
      [currentIndex]="quiz.currentIndex()"
      [total]="quiz.total()"
      (answerSelected)="quiz.selectAnswer($event)"
    />

    <!-- Navigation footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-lg px-6 py-4 flex justify-between items-center max-w-xl mx-auto">
      <button
        (click)="quiz.prev()"
        [disabled]="quiz.currentIndex() === 0"
        class="flex items-center gap-1.5 px-5 py-2 rounded-xl border-2 border-gray-200 text-gray-600 font-medium hover:border-indigo-300 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
      >
        <lucide-icon name="chevron-left" [size]="16"></lucide-icon>
        {{ i18n.t().quiz.back }}
      </button>

      <span class="text-xs text-gray-400">
        {{ quiz.answers().filter(a => a !== null).length }} / {{ quiz.total() }} {{ i18n.t().quiz.answered }}
      </span>

      <button
        (click)="quiz.next()"
        [disabled]="!quiz.isAnswered()"
        class="flex items-center gap-1.5 px-5 py-2 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
      >
        @if (quiz.isLastQuestion()) {
          {{ i18n.t().quiz.seeResults }}
          <lucide-icon name="chevron-right" [size]="16"></lucide-icon>
        } @else {
          {{ i18n.t().quiz.next }}
          <lucide-icon name="chevron-right" [size]="16"></lucide-icon>
        }
      </button>
    </div>
  }

  @case ('finished') {
    <app-result
      [score]="quiz.score()"
      [total]="quiz.total()"
      [questions]="quiz.questions()"
      [answers]="quiz.answers()"
      (restart)="quiz.restart()"
    />
  }
}
